name: ClaudeCodeUsage
options:
  bundleIdPrefix: app.vincentlauriat
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.1"

settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_VERSION: "5.9"
    INFOPLIST_FILE: ClaudeCodeUsage/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

targets:
  ClaudeCodeUsage:
    type: application
    platform: macOS
    sources:
      - ClaudeCodeUsage
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.vincentlauriat.ClaudeCodeUsage
        MARKETING_VERSION: "1.1.1"
        CURRENT_PROJECT_VERSION: "3"
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_ENTITLEMENTS: ClaudeCodeUsage/ClaudeCodeUsage.entitlements
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: NO
          CODE_SIGNING_ALLOWED: YES
        Release:
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: "KFLACS69T9"
          CODE_SIGN_IDENTITY: "Developer ID Application"
    dependencies:
      - package: Sparkle
        product: Sparkle

  ClaudeCodeUsageTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - ClaudeCodeUsageTests
    dependencies:
      - target: ClaudeCodeUsage
